name: Hugo Site CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This is important for pushing to gh-pages
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.160.0'
          extended: true

      - name: Build
        run: hugo --minify --cleanDestinationDir --buildFuture

      - name: Copy CNAME
        run: |
          if [ -f CNAME ]; then
            cp CNAME public/
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
          # Optional: enable Jekyll to be disabled
          # jekyll: false